name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: monitoring-ui/package-lock.json

      - name: Test and build monitoring UI
        working-directory: monitoring-ui
        run: |
          npm ci
          npm test
          npm run build

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots verify -Ddurga.integration.requireDocker=true
