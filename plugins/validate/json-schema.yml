id: json-schema-validator
name: JSON Schema Validator
version: 1.0.0
category: validate
status: experimental
description: >
  Validates JSON payloads against a configurable schema subset. Supports
  type checking, required fields, enum values, numeric ranges, string
  length bounds, regex patterns, nested objects, and array item validation.
  Invalid payloads throw, routing to the DLQ channel.

input:
  schema:
    type: object
    description: JSON payload to validate

output:
  schema:
    type: object
    description: Input payload unchanged if valid

config:
  type: inline-json-schema
  description: >
    JSON object defining the schema. Supports: type, required, properties,
    enum, minimum, maximum, minLength, maxLength, pattern (Java regex),
    items (array element schema).

implementation:
  class: org.gautelis.durga.plugins.JsonSchemaValidator
