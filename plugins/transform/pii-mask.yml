id: pii-mask
name: PII Mask
version: 1.0.0
category: transform
status: stable
description: >
  Masks sensitive fields in a JSON payload. Configurable mask character and
  character preservation at boundaries. Supports nested fields via dot-notation.

input:
  schema:
    type: object
    description: JSON payload with sensitive fields

output:
  schema:
    type: object
    description: JSON payload with masked fields

config:
  fields:
    type: string
    required: true
    description: Comma-separated field names to mask
  mask:
    type: string
    required: false
    description: Replacement character (default *)
    default: "*"
  preserve:
    type: integer
    required: false
    description: Characters to preserve at start and end (default 0)
    default: "0"

implementation:
  class: org.gautelis.durga.plugins.PiiMask
