services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.4
    container_name: durga-redpanda
    command:
      - redpanda start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:9094
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:9094
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "9094:9094"   # Kafka external
      - "18081:18081"  # Schema Registry external
      - "18082:18082"  # HTTP Proxy external
      - "9644:9644"    # Admin / metrics
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: durga-postgres
    environment:
      POSTGRES_USER: durga
      POSTGRES_PASSWORD: durga
      POSTGRES_DB: durga_e2e
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U durga"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.8.0
    container_name: durga-connect
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: redpanda:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: localhost
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: durga-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: durga-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: durga-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: durga-connect-status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_PLUGIN_PATH: /usr/share/java,/etc/kafka-connect/jars
    volumes:
      - connect-data:/var/lib/kafka-connect

volumes:
  pgdata:
  connect-data:
